<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline — Ade.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0a0b10;color:#e6e8ee;font-family:'Inter',-apple-system,system-ui,sans-serif;overflow:hidden}
    .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px;position:relative}

    /* Ambient orbs */
    .orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px)}
    .orb-1{top:-100px;right:-100px;width:350px;height:350px;background:radial-gradient(circle,rgba(124,158,255,0.1),transparent 70%);animation:drift 14s ease-in-out infinite}
    .orb-2{bottom:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(82,209,164,0.07),transparent 70%);animation:drift 18s ease-in-out infinite reverse}
    @keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-20px)}66%{transform:translate(-20px,30px)}}

    .cat-wrap{position:relative;margin-bottom:32px}
    /* Z's */
    .zzz{position:absolute;top:-10px;right:-20px;font-family:'JetBrains Mono',monospace;font-weight:600;pointer-events:none}
    .z{position:absolute;color:#7c9eff;opacity:0;animation:zFloat 3s ease-in-out infinite}
    .z1{font-size:14px;animation-delay:0s}
    .z2{font-size:18px;left:12px;top:-14px;animation-delay:0.6s}
    .z3{font-size:22px;left:26px;top:-30px;animation-delay:1.2s}
    @keyframes zFloat{0%{opacity:0;transform:translateY(4px) rotate(-8deg)}25%{opacity:0.8}75%{opacity:0.8}100%{opacity:0;transform:translateY(-18px) rotate(8deg)}}

    .cat{animation:catSleep 4s ease-in-out infinite}
    @keyframes catSleep{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-2px) rotate(-1deg)}50%{transform:translateY(-4px) rotate(0deg)}75%{transform:translateY(-2px) rotate(1deg)}}

    h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px}
    .sub{font-size:15px;color:#9aa0ac;line-height:1.5;max-width:360px;margin-bottom:24px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;background:linear-gradient(135deg,#7c9eff,#52d1a4);color:#0a0b10;font-weight:600;font-size:13px;border:none;cursor:pointer;text-decoration:none;transition:box-shadow .2s}
    .btn:hover{box-shadow:0 4px 16px rgba(124,158,255,0.3)}
    .mono{font-family:'JetBrains Mono',monospace;font-size:12px;color:#5f6673;margin-top:20px}
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="wrap">
    <div class="cat-wrap">
      <!-- Sleeping cat -->
      <div class="cat">
        <svg viewBox="0 0 180 200" width="140" height="156">
          <defs>
            <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4a5160"/><stop offset="1" stop-color="#2d3240"/></linearGradient>
            <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2d3240"/><stop offset="1" stop-color="#181b23"/></linearGradient>
          </defs>
          <path d="M30 130 Q30 90 90 85 Q150 90 150 130 L150 180 L30 180 Z" fill="url(#hood)"/>
          <path d="M55 65 L50 30 L75 55 Z" fill="url(#fur)"/>
          <path d="M125 65 L130 30 L105 55 Z" fill="url(#fur)"/>
          <path d="M58 55 L56 42 L68 52 Z" fill="#e89a96" opacity="0.8"/>
          <path d="M122 55 L124 42 L112 52 Z" fill="#e89a96" opacity="0.8"/>
          <ellipse cx="90" cy="85" rx="48" ry="42" fill="url(#fur)"/>
          <!-- Closed eyes (sleeping) -->
          <path d="M62 82 Q72 76 82 82" stroke="#0a0b10" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M98 82 Q108 76 118 82" stroke="#0a0b10" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M86 98 L94 98 L90 104 Z" fill="#e89a96"/>
          <path d="M90 104 Q85 110 80 108 M90 104 Q95 110 100 108" stroke="#1a1d26" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <g stroke="#9aa0ac" stroke-width="0.8" opacity="0.4">
            <path d="M45 95 L68 98 M45 102 L68 103"/>
            <path d="M135 95 L112 98 M135 102 L112 103"/>
          </g>
          <ellipse cx="45" cy="160" rx="10" ry="8" fill="url(#fur)"/>
          <ellipse cx="135" cy="160" rx="10" ry="8" fill="url(#fur)"/>
        </svg>
      </div>
      <!-- Z's floating -->
      <div class="zzz">
        <span class="z z1">z</span>
        <span class="z z2">z</span>
        <span class="z z3">Z</span>
      </div>
    </div>

    <h1>neko is napping 💤</h1>
    <p class="sub">looks like you're offline right now. the cat will wake up when your connection is back — or you can try again.</p>
    <button class="btn" onclick="window.location.reload()">try again →</button>
    <p class="mono">$ ping ade.dev — request timed out</p>
  </div>
</body>
</html>
